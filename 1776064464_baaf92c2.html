<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企业客户经营数据分析看板</title>
    <!-- 引入 Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- 引入 Chart.js Data Labels Plugin -->
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <!-- 引入 html-docx-js -->
    <script src="https://cdn.jsdelivr.net/npm/html-docx-js@0.3.1/dist/html-docx.min.js"></script>
    <!-- 引入 FileSaver.js -->
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>

    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333;
            --success-color: #27ae60;
            --danger-color: #c0392b;
            --border-radius: 8px;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
        }

        h1 {
            margin: 0;
            color: var(--primary-color);
            font-size: 24px;
        }

        .btn-download {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-download:hover {
            background-color: #2980b9;
        }

        /* KPI Cards */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .kpi-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            text-align: center;
            border-top: 4px solid var(--accent-color);
        }

        .kpi-title {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 10px;
        }

        .kpi-value {
            font-size: 28px;
            font-weight: bold;
            color: var(--primary-color);
        }

        .kpi-trend {
            font-size: 14px;
            margin-top: 5px;
        }

        .trend-up { color: var(--success-color); }
        .trend-down { color: var(--danger-color); }

        /* Analysis Text */
        .analysis-section {
            background: var(--card-bg);
            padding: 25px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .analysis-section h2 {
            margin-top: 0;
            color: var(--primary-color);
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        /* Charts Grid */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 900px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }

        .chart-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            height: 400px;
            position: relative;
        }

        .chart-card h3 {
            margin-top: 0;
            color: var(--primary-color);
            font-size: 16px;
            text-align: center;
            margin-bottom: 15px;
        }

        .chart-container {
            position: relative;
            height: 320px;
            width: 100%;
        }

        /* Table */
        .table-container {
            background: var(--card-bg);
            padding: 20px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            overflow-x: auto;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th, td {
            padding: 12px 15px;
            text-align: right;
            border-bottom: 1px solid #ddd;
        }

        th:first-child, td:first-child {
            text-align: left;
            position: sticky;
            left: 0;
            background: #fff;
            z-index: 1;
        }
        
        th {
            background-color: #f8f9fa;
            color: var(--primary-color);
            font-weight: 600;
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        .text-green { color: var(--success-color); font-weight: bold; }
        .text-red { color: var(--danger-color); font-weight: bold; }
        .text-gray { color: #95a5a6; }

        /* Footer Button */
        .footer-download {
            text-align: center;
            margin-top: 40px;
            margin-bottom: 40px;
        }

        /* Print/Export Styles */
        @media print {
            .btn-download { display: none; }
            body { background: white; }
            .chart-card { break-inside: avoid; }
        }
    </style>
</head>
<body>

<div class="container" id="dashboard-content">
    <header>
        <div>
            <h1>企业客户经营数据分析看板</h1>
            <p style="margin: 5px 0 0 0; color: #7f8c8d; font-size: 14px;">数据周期：2025 年度 | 生成时间：<span id="current-date"></span></p>
        </div>
        <button class="btn-download" onclick="exportToWord()">
            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
            下载 Word 报告
        </button>
    </header>

    <!-- KPI Section -->
    <div class="kpi-grid">
        <div class="kpi-card">
            <div class="kpi-title">2025 年总营收</div>
            <div class="kpi-value" id="kpi-total-revenue">-</div>
            <div class="kpi-trend" id="kpi-revenue-growth">环比上期：--</div>
        </div>
        <div class="kpi-card">
            <div class="kpi-title">新增订单总额</div>
            <div class="kpi-value" id="kpi-new-orders">-</div>
            <div class="kpi-trend">订单转化率：<span id="kpi-conversion-rate">-</span></div>
        </div>
        <div class="kpi-card">
            <div class="kpi-title">综合平均毛利率</div>
            <div class="kpi-value" id="kpi-avg-margin">-</div>
            <div class="kpi-trend">最高毛利行业：<span id="kpi-best-industry">-</span></div>
        </div>
        <div class="kpi-card">
            <div class="kpi-title">年度平均回款率</div>
            <div class="kpi-value" id="kpi-avg-collection">-</div>
            <div class="kpi-trend">应收账款总额：<span id="kpi-ar-total">-</span></div>
        </div>
    </div>

    <!-- Analysis Summary -->
    <div class="analysis-section">
        <h2>📊 营运情况深度分析总结</h2>
        <p id="analysis-text">
            正在生成分析报告...
        </p>
    </div>

    <!-- Charts Section -->
    <div class="charts-grid">
        <!-- Chart 1: Revenue by Industry -->
        <div class="chart-card">
            <h3>各行业营收贡献分布 (万元)</h3>
            <div class="chart-container">
                <canvas id="chartIndustry"></canvas>
            </div>
        </div>
        <!-- Chart 2: Quarterly Trend -->
        <div class="chart-card">
            <h3>2025 年季度营收趋势分析 (万元)</h3>
            <div class="chart-container">
                <canvas id="chartTrend"></canvas>
            </div>
        </div>
        <!-- Chart 3: Top Customers Bar -->
        <div class="chart-card">
            <h3>客户营收排名 TOP 10 (万元)</h3>
            <div class="chart-container">
                <canvas id="chartTopCustomers"></canvas>
            </div>
        </div>
        <!-- Chart 4: Region Distribution -->
        <div class="chart-card">
            <h3>区域市场营收占比分析</h3>
            <div class="chart-container">
                <canvas id="chartRegion"></canvas>
            </div>
        </div>
    </div>

    <!-- Detailed Table -->
    <div class="table-container">
        <h3 style="margin-top:0; color: var(--primary-color);">详细客户经营数据对比表</h3>
        <table id="data-table">
            <thead>
                <tr>
                    <th>客户名称</th>
                    <th>行业</th>
                    <th>等级</th>
                    <th>区域</th>
                    <th>2025 总营收</th>
                    <th>新增订单</th>
                    <th>毛利率 (%)</th>
                    <th>回款率 (%)</th>
                    <th>应收账款</th>
                    <th>复购率 (%)</th>
                    <th>Q4 环比增长</th>
                </tr>
            </thead>
            <tbody>
                <!-- Data will be populated by JS -->
            </tbody>
        </table>
    </div>

    <div class="footer-download">
        <button class="btn-download" style="margin: 0 auto;" onclick="exportToWord()">
            下载报告文档 (.doc)
        </button>
    </div>
</div>

<script>
    // --- 1. Data Processing ---
    const rawData = [
        ["KH2026001", "华宇恒通实业集团有限公司", "制造业", "战略客户", 12, "华北", 12800, 2800, 3200, 3500, 3300, 18.5, 98.2, 230.4, 13500, 100, "王建军"],
        ["KH2026002", "星途创科信息技术集团股份有限公司", "信息技术服务业", "战略客户", 10, "华东", 15600, 3200, 3600, 4000, 4800, 42.3, 97.5, 390.0, 16800, 100, "李梦琪"],
        ["KH2026003", "盛宏源建设集团有限公司", "建筑业", "战略客户", 15, "华中", 9600, 1800, 2600, 3000, 2200, 12.8, 96.8, 307.2, 10200, 98, "刘志强"],
        ["KH2026004", "鑫瑞联商贸集团有限公司", "批发零售业", "战略客户", 8, "华南", 8200, 1600, 1800, 2000, 2800, 11.2, 97.0, 246.0, 8800, 100, "张雨晴"],
        ["KH2026005", "天合智联科技发展集团有限公司", "信息技术服务业", "战略客户", 9, "西南", 7500, 1500, 1800, 2100, 2100, 45.6, 98.0, 150.0, 8100, 100, "陈浩然"],
        ["KH2026006", "中汇智造机械有限公司", "制造业", "核心客户", 7, "华东", 3800, 850, 950, 1050, 950, 16.8, 95.5, 171.0, 4100, 96, "赵伟"],
        ["KH2026007", "悦享优品商贸有限公司", "批发零售业", "核心客户", 6, "华南", 2900, 550, 650, 700, 1000, 10.5, 94.2, 168.2, 3200, 95, "林晓燕"],
        ["KH2026008", "云帆数字技术有限公司", "信息技术服务业", "核心客户", 8, "华北", 3200, 700, 750, 850, 900, 38.2, 96.0, 128.0, 3500, 98, "孙宇"],
        ["KH2026009", "城建兴业工程有限公司", "建筑业", "核心客户", 11, "华中", 4200, 800, 1100, 1300, 1000, 13.5, 93.8, 260.4, 4500, 92, "周明"],
        ["KH2026012", "佳惠生活超市连锁有限公司", "批发零售业", "普通客户", 6, "华中", 520, 110, 120, 130, 160, 9.8, 90.5, 49.4, 560, 85, "黄丽"],
        ["KH2026019", "星辰文化传媒有限公司", "租赁和商务服务业", "普通客户", 3, "华南", 480, 100, 120, 130, 130, 30.6, 91.0, 43.2, 520, 87, "苏晴"]
    ];

    // Map data to objects
    const customers = rawData.map(row => ({
        id: row[0],
        name: row[1],
        industry: row[2],
        level: row[3],
        years: row[4],
        region: row[5],
        totalRev: row[6],
        q1: row[7],
        q2: row[8],
        q3: row[9],
        q4: row[10],
        margin: row[11],
        collection: row[12],
        ar: row[13],
        newOrders: row[14],
        repurchase: row[15],
        manager: row[16]
    }));

    // Calculations
    const totalRevenue = customers.reduce((sum, c) => sum + c.totalRev, 0);
    const totalNewOrders = customers.reduce((sum, c) => sum + c.newOrders, 0);
    const avgMargin = customers.reduce((sum, c) => sum + c.margin, 0) / customers.length;
    const avgCollection = customers.reduce((sum, c) => sum + c.collection, 0) / customers.length;
    const totalAR = customers.reduce((sum, c) => sum + c.ar, 0);

    // Aggregations for Charts
    const industryData = {};
    const regionData = {};
    const quarterlyData = { Q1: 0, Q2: 0, Q3: 0, Q4: 0 };

    customers.forEach(c => {
        // Industry
        industryData[c.industry] = (industryData[c.industry] || 0) + c.totalRev;
        // Region
        regionData[c.region] = (regionData[c.region] || 0) + c.totalRev;
        // Quarters
        quarterlyData.Q1 += c.q1;
        quarterlyData.Q2 += c.q2;
        quarterlyData.Q3 += c.q3;
        quarterlyData.Q4 += c.q4;
    });

    // Sort customers for Top 10
    const sortedCustomers = [...customers].sort((a, b) => b.totalRev - a.totalRev);

    // Format Currency
    const fmtMoney = (num) => num.toLocaleString('zh-CN', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
    const fmtPercent = (num) => num.toFixed(1) + '%';

    // --- 2. Update DOM Elements ---
    document.getElementById('current-date').innerText = new Date().toLocaleDateString();
    document.getElementById('kpi-total-revenue').innerText = fmtMoney(totalRevenue) + ' 万元';
    document.getElementById('kpi-new-orders').innerText = fmtMoney(totalNewOrders) + ' 万元';
    document.getElementById('kpi-avg-margin').innerText = fmtPercent(avgMargin);
    document.getElementById('kpi-avg-collection').innerText = fmtPercent(avgCollection);
    document.getElementById('kpi-ar-total').innerText = fmtMoney(totalAR) + ' 万元';
    
    // Find best industry
    let bestInd = '';
    let maxMarg = 0;
    customers.forEach(c => { if(c.margin > maxMarg) { maxMarg = c.margin; bestInd = c.industry; }});
    document.getElementById('kpi-best-industry').innerText = bestInd;

    // Conversion Rate (New Orders / Total Rev approx)
    const convRate = (totalNewOrders / totalRevenue) * 100;
    document.getElementById('kpi-conversion-rate').innerText = fmtPercent(convRate);

    // Generate Analysis Text
    const analysisText = `
        <strong>1. 整体营运概况：</strong><br>
        2025 年度公司整体表现稳健，累计实现总营收 <strong>${fmtMoney(totalRevenue)} 万元</strong>，新增订单金额达 <strong>${fmtMoney(totalNewOrders)} 万元</strong>，订单转化效率较高。综合毛利率维持在 <strong>${fmtPercent(avgMargin)}</strong> 的健康水平，其中信息技术服务业凭借高附加值特性，成为利润贡献的核心驱动力。年度平均回款率达到 <strong>${fmtPercent(avgCollection)}</strong>，显示公司现金流管理良好，但期末应收账款总额仍达 ${fmtMoney(totalAR)} 万元，需关注部分长账龄客户的回款进度。<br><br>
        
        <strong>2. 关键增长点：</strong><br>
        <strong>行业维度：</strong>信息技术服务业表现最为亮眼，以“星途创科”和“天合智联”为代表，不仅营收规模大，且毛利率高达 40% 以上，是公司的主要利润来源。<br>
        <strong>客户维度：</strong>战略客户贡献了绝大部分营收，头部效应显著。特别是“星途创科”单家营收突破 1.5 亿元，且第四季度呈现强劲增长态势（环比增长 20%），显示出极强的业务扩张能力。<br>
        <strong>区域维度：</strong>华东与华北地区为营收主力军，合计占比超过 50%，表明公司在经济发达区域的渗透率较高。<br><br>

        <strong>3. 风险点提示：</strong><br>
        <strong>低毛利风险：</strong>批发零售业与建筑业虽然营收规模尚可，但毛利率普遍低于 15%，抗风险能力较弱，易受原材料价格波动影响。<br>
        <strong>回款压力：</strong>尽管整体回款率高，但“盛宏源建设”等建筑类客户应收账款绝对值较大（超 300 万），且行业特性导致回款周期长，存在坏账隐患。<br>
        <strong>客户依赖：</strong>前五大客户贡献了超过 70% 的营收，客户集中度较高，若核心战略客户流失将对业绩造成重大冲击。<br><br>

        <strong>4. 发展建议：</strong><br>
        建议继续深耕信息技术服务领域，加大对该行业高潜客户的资源倾斜；针对批发零售和建筑业客户，应优化供应链成本以提升毛利空间；同时，建立分级应收账款预警机制，重点监控建筑行业大额欠款，确保资金安全。此外，需着手培育“核心客户”向“战略客户”转化，降低对单一超大客户的依赖度。
    `;
    document.getElementById('analysis-text').innerHTML = analysisText;

    // --- 3. Chart Configuration ---
    Chart.defaults.font.family = "'Segoe UI', 'Helvetica', 'Arial', sans-serif";
    Chart.defaults.color = '#666';
    
    // Common Options for Data Labels
    const datalabelsConfig = {
        anchor: 'end',
        align: 'top',
        formatter: (value) => {
            if (typeof value === 'number') {
                return value >= 1000 ? (value/1000).toFixed(1) + 'k' : value;
            }
            return value;
        },
        font: { weight: 'bold', size: 12 },
        color: '#2c3e50'
    };

    const datalabelsPercent = {
        ...datalabelsConfig,
        formatter: (value, context) => {
            const total = context.chart._metasets[context.datasetIndex].total;
            const percentage = ((value / total) * 100).toFixed(1) + '%';
            return percentage;
        }
    };

    // Colors
    const colors = {
        blue: '#3498db',
        green: '#2ecc71',
        orange: '#e67e22',
        red: '#e74c3c',
        purple: '#9b59b6',
        teal: '#1abc9c',
        yellow: '#f1c40f',
        gray: '#95a5a6'
    };
    const palette = Object.values(colors);

    // Chart 1: Industry Bar
    new Chart(document.getElementById('chartIndustry'), {
        type: 'bar',
        data: {
            labels: Object.keys(industryData),
            datasets: [{
                label: '营收 (万元)',
                data: Object.values(industryData),
                backgroundColor: palette.slice(0, Object.keys(industryData).length),
                borderRadius: 4
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                datalabels: {
                    anchor: 'end',
                    align: 'top',
                    formatter: (val) => fmtMoney(val),
                    font: { weight: 'bold' },
                    color: '#333'
                }
            },
            scales: {
                y: { beginAtZero: true, grid: { color: '#f0f0f0' } },
                x: { grid: { display: false } }
            }
        }
    });

    // Chart 2: Trend Line
    new Chart(document.getElementById('chartTrend'), {
        type: 'line',
        data: {
            labels: ['Q1', 'Q2', 'Q3', 'Q4'],
            datasets: [{
                label: '季度总营收',
                data: [quarterlyData.Q1, quarterlyData.Q2, quarterlyData.Q3, quarterlyData.Q4],
                borderColor: colors.blue,
                backgroundColor: 'rgba(52, 152, 219, 0.1)',
                tension: 0.4,
                fill: true,
                pointRadius: 6,
                pointHoverRadius: 8
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                datalabels: {
                    align: 'top',
                    formatter: (val) => fmtMoney(val),
                    font: { weight: 'bold', size: 13 },
                    color: colors.blue
                }
            },
            scales: {
                y: { beginAtZero: false, grid: { color: '#f0f0f0' } },
                x: { grid: { display: false } }
            }
        }
    });

    // Chart 3: Top Customers Horizontal Bar
    const top10 = sortedCustomers.slice(0, 10);
    new Chart(document.getElementById('chartTopCustomers'), {
        type: 'bar',
        indexAxis: 'y',
        data: {
            labels: top10.map(c => c.name.length > 10 ? c.name.substring(0, 10) + '..' : c.name),
            datasets: [{
                label: '营收 (万元)',
                data: top10.map(c => c.totalRev),
                backgroundColor: colors.purple,
                borderRadius: 4
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                datalabels: {
                    align: 'right',
                    anchor: 'end',
                    formatter: (val) => fmtMoney(val),
                    font: { weight: 'bold', size: 11 },
                    color: '#333'
                }
            },
            scales: {
                x: { beginAtZero: true, grid: { color: '#f0f0f0' } },
                y: { grid: { display: false } }
            }
        }
    });

    // Chart 4: Region Doughnut
    new Chart(document.getElementById('chartRegion'), {
        type: 'doughnut',
        data: {
            labels: Object.keys(regionData),
            datasets: [{
                data: Object.values(regionData),
                backgroundColor: [colors.blue, colors.green, colors.orange, colors.red, colors.teal],
                borderWidth: 2,
                borderColor: '#fff'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            cutout: '60%',
            plugins: {
                legend: { position: 'right' },
                datalabels: {
                    color: '#fff',
                    font: { weight: 'bold' },
                    formatter: (val, ctx) => {
                        const total = ctx.chart._metasets[ctx.datasetIndex].total;
                        return ((val / total) * 100).toFixed(1) + '%';
                    }
                }
            }
        }
    });

    // --- 4. Populate Table ---
    const tableBody = document.querySelector('#data-table tbody');
    customers.forEach(c => {
        // Calculate QoQ for Q4 vs Q3
        let qoq = '-';
        let qoqClass = 'text-gray';
        if (c.q3 > 0) {
            const growth = ((c.q4 - c.q3) / c.q3) * 100;
            qoq = (growth > 0 ? '+' : '') + growth.toFixed(1) + '%';
            qoqClass = growth >= 0 ? 'text-green' : 'text-red';
        }

        const row = `
            <tr>
                <td>${c.name}</td>
                <td>${c.industry}</td>
                <td><span style="padding:2px 6px; background:#eee; border-radius:4px; font-size:12px;">${c.level}</span></td>
                <td>${c.region}</td>
                <td style="font-weight:bold;">${fmtMoney(c.totalRev)}</td>
                <td>${fmtMoney(c.newOrders)}</td>
                <td>${c.margin}%</td>
                <td>${c.collection}%</td>
                <td>${fmtMoney(c.ar)}</td>
                <td>${c.repurchase}%</td>
                <td class="${qoqClass}">${qoq}</td>
            </tr>
        `;
        tableBody.innerHTML += row;
    });

    // --- 5. Export to Word Functionality ---
    function exportToWord() {
        const header = `
            <html xmlns:o='urn:schemas-microsoft-com:office:office' 
                  xmlns:w='urn:schemas-microsoft-com:office:word' 
                  xmlns='http://www.w3.org/TR/REC-html40'>
            <head>
                <meta charset='utf-8'>
                <title>企业数据分析报告</title>
                <style>
                    body { font-family: 'SimSun', 'Songti SC', serif; }
                    h1 { text-align: center; color: #2c3e50; }
                    h2 { color: #2c3e50; border-bottom: 1px solid #ccc; padding-bottom: 5px; }
                    table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 12px; }
                    th, td { border: 1px solid #000; padding: 8px; text-align: center; }
                    th { background-color: #f0f0f0; }
                    .kpi-container { display: flex; justify-content: space-around; margin: 20px 0; }
                    .kpi-box { border: 1px solid #ccc; padding: 10px; width: 20%; text-align: center; }
                    .chart-img { text-align: center; margin: 20px 0; page-break-inside: avoid; }
                    img { max-width: 100%; height: auto; }
                </style>
            </head>
            <body>`;

        // Get Content
        const title = document.querySelector('h1').outerHTML;
        const dateInfo = document.querySelector('header p').outerHTML;
        
        // Build KPI HTML for Word
        let kpiHtml = '<div class="kpi-container">';
        document.querySelectorAll('.kpi-card').forEach(card => {
            kpiHtml += `<div class="kpi-box">
                <div style="color:#7f8c8d; font-size:12px;">${card.querySelector('.kpi-title').innerText}</div>
                <div style="font-size:18px; font-weight:bold; color:#2c3e50;">${card.querySelector('.kpi-value').innerText}</div>
                <div style="font-size:12px;">${card.querySelector('.kpi-trend').innerText}</div>
            </div>`;
        });
        kpiHtml += '</div>';

        const analysisHtml = document.querySelector('.analysis-section').outerHTML;
        
        // Convert Charts to Images
        let chartsHtml = '<h2>📊 数据可视化图表</h2>';
        document.querySelectorAll('canvas').forEach(canvas => {
            const imgData = canvas.toDataURL('image/png', 1.0);
            const chartTitle = canvas.parentElement.previousElementSibling.innerText;
            chartsHtml += `
                <div class="chart-img">
                    <h3 style="text-align:center; font-size:14px;">${chartTitle}</h3>
                    <img src="${imgData}" alt="Chart" />
                </div>
            `;
        });

        const tableHtml = document.querySelector('.table-container').outerHTML;
        const footer = '</body></html>';

        const fullContent = header + title + dateInfo + kpiHtml + analysisHtml + chartsHtml + tableHtml + footer;

        // Generate Blob and Save
        try {
            const blob = htmlDocx.asBlob(fullContent);
            saveAs(blob, '企业客户经营数据分析报告.doc');
        } catch (e) {
            alert('导出失败，请检查浏览器兼容性或控制台错误。\n错误信息：' + e.message);
            console.error(e);
        }
    }
</script>

</body>
</html>
